{% extends 'catalog/base.html' %}
{% load my_tags %}
{% block content %}
<section class="py-5 text-center container">
    <div class="row">
        <div class="col-lg-6 col-md-2 mx-auto">
            <h1 class="fw-light">НАШ БЛОГ</h1>
            <p>
                <a class="btn btn-primary" href="{% url 'blogs:blog_create' %}" role="button">Создать новую
                    статью</a>
            </p>
        </div>
    </div>
</section>
<div class="album py-5 bg-body-tertiary">
    <div class="container">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
            {% for blog in object_list %}
            <div class="col">
                <div class="card shadow-sm">
                    <img src="{{ blog.preview | media_filter }}">
                    <div class="card-body">
                        <p class="card-text">{{ blog.name }}</p>
                        <p class="card-text">{{ blog.body | truncatechars:100 }}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="btn-group">
                                <a class="btn btn-primary" href="{% url 'blogs:blog_detail' blog.pk %}" role="button">Читать</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
